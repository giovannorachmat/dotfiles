# ====
# Main config
# ====
enable_audio_bell yes

font_family CaskaydiaCove Nerd Font Mono
font_size 16
bold_font auto
bold_italic_font auto
italic_font auto

copy_on_select yes

detect_urls yes

window_padding_width 25

scrollback_lines 50000

cursor_trail_decay 0.1 0.4
cursor_trail 3
cursor_shape block
cursor_beam_thickness 2
cursor_blink_interval 2

background_opacity 0.8
background_blur 10

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Performance tuning
input_delay 0
repaint_delay 2
sync_to_monitor no
wayland_enable_ime no

# ====
# Remaps
# ====

## Clear screen
map ctrl+l clear_terminal to_cursor_scroll active

## jump to end of line:
map super+right send_text all \x05

## jump to start of line:
map super+left send_text all \x01

## jump right to end of word:
map alt+right send_text all \x1b\x66

## jump left to beginning of word:
map alt+left send_text all \x1b\x62

## delete line from cursor position to start of line:
map super+backspace send_text all \x15

## undo:
map super+z send_text all \x1f

action_alias launch_tab launch --cwd=current --type=tab

map cmd+alt+t launch_tab nvim .
map cmd+t launch_tab
map ctrl+shift+enter launch --cwd=current --type=window

# remap to open new kitty tab in the same directory (default is home dir)
# map ctrl+shift+t            new_tab_with_cwd

# ====
# Theme
# ====

# Eldritch dark
include current-theme.conf
include hyde.conf

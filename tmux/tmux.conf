# Set terminal environment and colors
set-option -g default-terminal "xterm-256color"
set-option -g terminal-overrides ',xterm-256color:RGB'
set-window-option -g xterm-keys on
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
set-environment -g TMUX_POWERLINE_THEME 'bubble'
set-environment -g EDITOR 'nvim'

# Set custom keybinds
unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

bind C-l send-keys 'C-l'

# Set keybinds Vim motions
setw -g mode-keys vi

# General settings
set -s escape-time 0 # Set escape-time to 0s
set -g mouse on # Enable adjust pane with mouse
set -g base-index 1
set -g set-clipboard on
set -g detach-on-destroy off
set -g history-limit 1000000
set -g renumber-windows on

# Change status bar position to top
set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'erikw/tmux-powerline'

set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
